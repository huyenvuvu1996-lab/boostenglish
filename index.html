<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boost English Center - AI Tutor Premium</title>

<style>
:root { --p:#003366; --bg:#f0f4f8; --success:#2ecc71; --fail:#d63031; }
body { font-family:Segoe UI; background:var(--bg); margin:0; display:flex; justify-content:center; padding:10px;}
.app-card { background:white; width:100%; max-width:450px; border-radius:25px; box-shadow:0 15px 35px rgba(0,0,0,0.1); overflow:hidden;}
.header { background:var(--p); color:white; padding:15px; text-align:center;}
.content { padding:20px; text-align:center;}
.word-card { background:#fff; border:2px solid #eee; border-radius:20px; padding:15px; margin-bottom:15px;}
.word-img { width:100%; height:180px; object-fit:cover; border-radius:15px; background:#eee;}
.word-en { font-size:2.2rem; font-weight:800; color:var(--p); margin:10px 0; display:block;}
.btn { width:100%; padding:16px; border:none; border-radius:15px; cursor:pointer; font-weight:bold; margin-bottom:10px;}
.btn-main { background:var(--p); color:white;}
.btn-rec { background:var(--fail); color:white;}
#studyPage,#resultPage,#loginPage{display:none;}
.rank-item{display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid #eee;}
.rank-me{background:#e8f5e9;font-weight:bold;color:#2ecc71;border-radius:8px;padding:8px;}
input,select{width:100%;padding:12px;border:2px solid #ddd;border-radius:12px;margin-bottom:12px;}
</style>
</head>

<body>
<div class="app-card">
<div class="header">
<h3 style="margin:0">BOOST ENGLISH CENTER 🇺🇸</h3>
<p style="margin:5px 0 0;font-size:0.8rem;">Gia sư AI luyện phát âm chuẩn</p>
</div>

<div class="content">
<div id="loading">🚀 Đang kết nối dữ liệu...</div>

<div id="loginPage">
<input type="text" id="stName" placeholder="Tên của con...">
<select id="stClass"></select>
<button class="btn btn-main" onclick="startApp()">VÀO HỌC NGAY 🚀</button>
</div>

<div id="studyPage">
<div id="prog" style="text-align:right;font-weight:bold;color:var(--p);">0/0</div>
<div class="word-card">
<img id="wImg" class="word-img">
<span class="word-en" id="wEn"></span>
<span id="wVi"></span>
</div>
<div id="stat" style="margin-bottom:10px;font-weight:bold;color:#555">Sẵn sàng!</div>
<button class="btn btn-main" onclick="playCurrent()">🔊 NGHE MẪU</button>
<button class="btn btn-rec" onclick="rec()">🎤 BẤM ĐỂ ĐỌC</button>
</div>

<div id="resultPage">
<h2 style="color:var(--p)">KẾT QUẢ: <span id="fScore"></span>/10</h2>
<div id="tutorDetails" style="margin-bottom:15px;"></div>
<div>
<strong>🏆 BẢNG XẾP HẠNG:</strong>
<div id="bContent" style="margin-top:10px;"></div>
</div>
<button class="btn btn-main" onclick="location.reload()">LUYỆN LẠI</button>
</div>

</div>
</div>

<script>

const scriptURL='https://script.google.com/macros/s/AKfycbyTaBKAOaduWcODPxAckPHv_1qzs91Qh7BVlA4fR-fglnab5rMM9Qv0zi2pKZQWFM1-yQ/exec';
const sheetID='10_lZS6fipCVC8lk9SBU7tHNw1NnU0-6VKuwJsOh4vrk';
const csvUrl=`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:csv`;

let data={},words=[],idx=0,total=0,name="",cls="";

const audioCorrect=new Audio('https://www.soundjay.com/buttons/sounds/button-11.mp3');
const audioWrong=new Audio('https://www.soundjay.com/buttons/sounds/button-10.mp3');

async function loadData(){
const r=await fetch(csvUrl);
const text=await r.text();
const rows=text.split('\n').map(r=>r.split(','));
rows.slice(1).forEach(c=>{
let cl=c[0]?.trim();
let en=c[1]?.trim();
let vi=c[2]?.trim();
if(cl&&en){
if(!data[cl])data[cl]=[];
data[cl].push({en,vi});
}});
document.getElementById('loading').style.display='none';
document.getElementById('loginPage').style.display='block';
let sel=document.getElementById('stClass');
Object.keys(data).forEach(k=>sel.add(new Option(k,k)));
}

function startApp(){
name=document.getElementById('stName').value.trim();
cls=document.getElementById('stClass').value;
if(!name)return alert("Nhập tên nhé!");

audioCorrect.load();audioWrong.load();

words=data[cls];
document.getElementById('loginPage').style.display='none';
document.getElementById('studyPage').style.display='block';
show();
}

function show(){
let w=words[idx];
document.getElementById('wEn').innerText=w.en;
document.getElementById('wVi').innerText=w.vi;
document.getElementById('prog').innerText=`${idx+1}/${words.length}`;
document.getElementById('stat').innerText="Mời con đọc!";
}

function playCurrent(){
speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(words[idx].en);
u.lang='en-US';
speechSynthesis.speak(u);
}

function rec(){
const rec=new(window.webkitSpeechRecognition||window.SpeechRecognition)();
rec.lang='en-US';
rec.onresult=e=>{
let heard=e.results[0][0].transcript.toLowerCase();
let target=words[idx].en.toLowerCase();
if(heard.includes(target)){
audioCorrect.play();
total++;
next();
}else{
audioWrong.play();
}
};
rec.start();
}

function next(){
if(idx<words.length-1){idx++;show();}
else finish();
}

async function finish(){
document.getElementById('studyPage').style.display='none';
document.getElementById('resultPage').style.display='block';

let score=((total/words.length)*10).toFixed(1);
document.getElementById('fScore').innerText=score;

let review=score>=8?"Phát âm rất tốt!":"Cần luyện thêm nhé!";
document.getElementById('tutorDetails').innerText=review;

await fetch(scriptURL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:name,
class:cls,
score:Number(score),
feedback:review
})
});

// LOAD LEADERBOARD ĐÚNG CHUẨN
const res=await fetch(scriptURL);
const list=await res.json();

let classList=list
.filter(r=>r.class===cls)
.sort((a,b)=>b.score-a.score);

document.getElementById('bContent').innerHTML=
classList.slice(0,10).map((r,i)=>
`<div class="rank-item ${r.name===name?'rank-me':''}">
<span>${i+1}. ${r.name}</span>
<strong>${Number(r.score).toFixed(1)}đ</strong>
</div>`).join('');
}

window.onload=loadData;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boost English Center</title>
    <style>
        :root { --p: #003366; --bg: #f0f4f8; --success: #2ecc71; --fail: #d63031; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding: 10px; }
        .app-card { background: white; width: 100%; max-width: 450px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--p); color: white; padding: 15px; text-align: center; }
        .content { padding: 20px; text-align: center; }
        .word-card { background: #fff; border: 2px solid #eee; border-radius: 20px; padding: 15px; margin-bottom: 15px; }
        .word-img { width: 100%; height: 180px; object-fit: cover; border-radius: 15px; }
        .word-en { font-size: 2.2rem; font-weight: 800; color: var(--p); margin: 10px 0; display: block; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 1rem; margin-bottom: 10px; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
        .btn-main { background: var(--p); color: white; }
        .btn-rec { background: var(--fail); color: white; }
        #studyPage, #resultPage, #loginPage { display: none; }
        .ai-feedback { background: #fff3e0; color: #d35400; padding: 12px; border-radius: 10px; margin: 10px 0; text-align: left; border-left: 4px solid #ff9800; display: none; font-size: 0.9rem; }
        .tutor-box { background: #eef2ff; border: 1px solid #c7d2fe; padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: left; }
        .leaderboard { text-align: left; background: #fffbe6; padding: 15px; border-radius: 15px; border: 1px solid #fed330; max-height: 250px; overflow-y: auto; }
        .rank-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .rank-me { background: #e8f5e9; font-weight: bold; color: #2ecc71; border: 1px solid #2ecc71; border-radius: 8px; }
        input, select { width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 12px; margin-bottom: 12px; font-size: 1rem; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h3 style="margin:0">BOOST ENGLISH CENTER 🇺🇸</h3>
        <p style="margin:5px 0 0; font-size:0.8rem;">Luyện phát âm chuẩn cùng AI</p>
    </div>

    <div class="content">
        <div id="loading">🚀 Đang khởi tạo dữ liệu...</div>
        
        <div id="loginPage">
            <input type="text" id="stName" placeholder="Tên của con...">
            <select id="stClass"></select>
            <button class="btn btn-main" onclick="startApp()">VÀO HỌC 🚀</button>
        </div>

        <div id="studyPage">
            <div id="prog" style="text-align:right; font-weight:bold; color:var(--p);">0/0</div>
            <div class="word-card">
                <img id="wImg" class="word-img" src="">
                <span class="word-en" id="wEn">...</span>
                <span id="wVi" style="color:#666">...</span>
            </div>
            <div style="margin-bottom:10px;"><small>🐢 Tốc độ nghe:</small> <input type="range" id="speedRate" min="0.4" max="1.0" step="0.1" value="0.8" style="width:60%; vertical-align: middle;"></div>
            <div id="stat" style="font-weight:bold; margin-bottom:10px; color:#555">Sẵn sàng!</div>
            <div id="aiTip" class="ai-feedback"></div>
            
            <button class="btn btn-main" onclick="playCurrent()">🔊 NGHE MẪU</button>
            <button class="btn btn-rec" onclick="rec()">🎤 BẤM ĐỂ ĐỌC</button>
            <button class="btn btn-main" style="background:#888; display:none" id="btnSkip" onclick="next()">⏭️ BỎ QUA</button>
        </div>

        <div id="resultPage">
            <h2 style="color:var(--p);">KẾT QUẢ: <span id="fScore"></span>/10</h2>
            
            <div id="tutorSection" class="tutor-box">
                <strong style="color:#1e40af;">💡 NHẬN XÉT:</strong>
                <div id="tutorDetails" style="margin-top:8px; font-size: 0.9rem;"></div>
            </div>

            <div class="leaderboard">
                <strong>🏆 BẢNG XẾP HẠNG LỚP <span id="clsDisplay"></span>:</strong>
                <div id="bContent" style="margin-top:10px;">Đang tải xếp hạng...</div>
            </div>
            <button class="btn btn-main" style="margin-top:20px" onclick="location.reload()">LUYỆN TẬP LẠI</button>
        </div>
    </div>
</div>

<script>
    // URL Google Apps Script của Cô
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyTaBKAOaduWcODPxAckPHv_1qzs91Qh7BVlA4fR-fglnab5rMM9Qv0zi2pKZQWFM1-yQ/exec';
    const sheetID = '10_lZS6fipCVC8lk9SBU7tHNw1NnU0-6VKuwJsOh4vrk';
    const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:csv`;
    
    let boostData = {}, curWords = [], curIdx = 0, totalPoints = 0, sName = "", cName = "", isWrongOnce = false;
    let mistakeAdvice = [];

    const sndCorrect = new Audio('https://www.myinstants.com/media/sounds/ding-sound-effect_1.mp3');
    const sndWrong = new Audio('https://www.myinstants.com/media/sounds/buzzer_x_it_out.mp3');

    async function loadData() {
        try {
            const r = await fetch(csvUrl);
            const text = await r.text();
            const rows = text.split('\n').map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
            rows.slice(1).forEach(c => {
                let cls = (c[0]||"").replace(/"/g, '').trim();
                let en = (c[1]||"").replace(/"/g, '').trim();
                let vi = (c[2]||"").replace(/"/g, '').trim();
                if (cls && en) {
                    if (!boostData[cls]) boostData[cls] = [];
                    boostData[cls].push({en, vi});
                }
            });
            document.getElementById('loading').style.display = 'none';
            document.getElementById('loginPage').style.display = 'block';
            let sel = document.getElementById('stClass');
            Object.keys(boostData).forEach(k => sel.add(new Option("Lớp: " + k, k)));
        } catch (e) { document.getElementById('loading').innerText = "Lỗi tải dữ liệu. Cô kiểm tra lại file Sheets nhé!"; }
    }

    function startApp() {
        sName = document.getElementById('stName').value.trim();
        cName = document.getElementById('stClass').value;
        if(!sName) return alert("Con hãy nhập tên nhé!");
        curWords = boostData[cName];
        document.getElementById('clsDisplay').innerText = cName;
        document.getElementById('loginPage').style.display='none';
        document.getElementById('studyPage').style.display='block';
        show();
    }

    function show() {
        isWrongOnce = false;
        document.getElementById('btnSkip').style.display = 'none';
        document.getElementById('aiTip').style.display = 'none';
        let w = curWords[curIdx];
        document.getElementById('wEn').innerText = w.en;
        document.getElementById('wVi').innerText = w.vi;
        document.getElementById('wImg').src = `https://source.unsplash.com/featured/400x300?${w.en}`;
        document.getElementById('prog').innerText = `${curIdx+1}/${curWords.length}`;
        document.getElementById('stat').innerText = "Mời con đọc bài!";
    }

    function rec() {
        const recognition = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
        recognition.lang = 'en-US';
        document.getElementById('stat').innerText = "🎧 Đang nghe...";
        
        recognition.onresult = (e) => {
            let heard = e.results[0][0].transcript.toLowerCase().trim();
            let target = curWords[curIdx].en.toLowerCase().trim();
            
            if(heard.includes(target)) {
                sndCorrect.play();
                totalPoints += isWrongOnce ? 0.5 : 1;
                document.getElementById('stat').innerText = "🌟 XUẤT SẮC!";
                setTimeout(() => next(), 1000);
            } else {
                sndWrong.play();
                isWrongOnce = true;
                document.getElementById('stat').innerText = "❌ Chưa đúng, thử lại nhé!";
                document.getElementById('aiTip').style.display = 'block';
                document.getElementById('aiTip').innerText = `AI nghe được: "${heard}"`;
                document.getElementById('btnSkip').style.display = 'block';
            }
        };
        recognition.start();
    }

    function next() {
        if(curIdx < curWords.length - 1) { curIdx++; show(); }
        else finish();
    }

    function playCurrent() {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(curWords[curIdx].en);
        msg.lang = 'en-US';
        msg.rate = document.getElementById('speedRate').value;
        window.speechSynthesis.speak(msg);
    }

    async function finish() {
        document.getElementById('studyPage').style.display = 'none';
        document.getElementById('resultPage').style.display = 'block';
        let score = ((totalPoints / curWords.length) * 10).toFixed(1);
        document.getElementById('fScore').innerText = score;
        
        document.getElementById('tutorDetails').innerText = score >= 8 ? "Chúc mừng con! Phát âm rất tuyệt vời." : "Con cần luyện tập nghe mẫu nhiều hơn nhé!";

        try {
            // Gửi điểm và nhận lại toàn bộ danh sách xếp hạng
            const response = await fetch(`${scriptURL}?name=${encodeURIComponent(sName)}&clss=${encodeURIComponent(cName)}&score=${score}`);
            const data = await response.json();
            
            // Lọc và sắp xếp bảng xếp hạng của lớp
            let list = data.filter(item => item[1] === cName)
                           .map(item => ({ name: item[0], score: parseFloat(item[2]) }))
                           .sort((a, b) => b.score - a.score);

            document.getElementById('bContent').innerHTML = list.slice(0, 10).map((r, i) => 
                `<div class="rank-item ${r.name === sName ? 'rank-me' : ''}">
                    <span>${i+1}. ${r.name}</span><strong>${r.score.toFixed(1)}đ</strong>
                </div>`).join('');
        } catch (e) {
            document.getElementById('bContent').innerText = "Đã lưu điểm thành công!";
        }
    }

    window.onload = loadData;
</script>
</body>
</html>

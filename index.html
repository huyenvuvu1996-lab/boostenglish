<script>
const scriptURL = 'https://script.google.com/macros/s/AKfycbyTaBKAOaduWcODPxAckPHv_1qzs91Qh7BVlA4fR-fglnab5rMM9Qv0zi2pKZQWFM1-yQ/exec';
const sheetID = '10_lZS6fipCVC8lk9SBU7tHNw1NnU0-6VKuwJsOh4vrk';
const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:csv`;

let boostData = {}, curWords = [], curIdx = 0, totalPoints = 0;
let sName = "", cName = "", isWrongOnce = false;

// 🔊 ÂM THANH
const audioCorrect = new Audio('https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg'); // TING
const audioWrong = new Audio('https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg');   // TÈ

audioCorrect.preload = "auto";
audioWrong.preload = "auto";

async function loadData() {
    try {
        const r = await fetch(csvUrl);
        const text = await r.text();
        const rows = text.split('\n').map(row =>
            row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
        );

        rows.slice(1).forEach(c => {
            let cls = (c[0]||"").replace(/"/g,'').trim();
            let en  = (c[1]||"").replace(/"/g,'').trim();
            let vi  = (c[2]||"").replace(/"/g,'').trim();
            if(cls && en){
                if(!boostData[cls]) boostData[cls]=[];
                boostData[cls].push({en,vi});
            }
        });

        document.getElementById('loading').style.display='none';
        document.getElementById('loginPage').style.display='block';

        let sel=document.getElementById('stClass');
        Object.keys(boostData).forEach(k =>
            sel.add(new Option("Lớp: "+k,k))
        );

    } catch(e){
        document.getElementById('loading').innerText="Lỗi kết nối!";
    }
}

function startApp(){
    sName=document.getElementById('stName').value.trim();
    cName=document.getElementById('stClass').value;
    if(!sName) return alert("Nhập tên nhé!");

    curWords=boostData[cName]||[];
    if(curWords.length===0) return alert("Chưa có dữ liệu lớp này");

    document.getElementById('clsDisplay').innerText=cName;
    document.getElementById('loginPage').style.display='none';
    document.getElementById('studyPage').style.display='block';
    show();
}

function show(){
    isWrongOnce=false;
    document.getElementById('btnSkip').style.display='none';

    let w=curWords[curIdx];
    document.getElementById('wEn').innerText=w.en;
    document.getElementById('wVi').innerText=w.vi;
    document.getElementById('wImg').src=
        `https://source.unsplash.com/400x300/?${encodeURIComponent(w.en)}`;

    document.getElementById('prog').innerText=
        `${curIdx+1}/${curWords.length}`;
    document.getElementById('stat').innerText="Mời con đọc bài!";
}

function talk(t){
    window.speechSynthesis.cancel();
    const m=new SpeechSynthesisUtterance(t);
    m.lang='en-US';
    m.rate=document.getElementById('speedRate').value;
    window.speechSynthesis.speak(m);
}

function playCurrent(){ talk(curWords[curIdx].en); }

function rec(){
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SpeechRecognition){
        alert("Trình duyệt không hỗ trợ mic!");
        return;
    }

    const recognition=new SpeechRecognition();
    recognition.lang='en-US';
    recognition.interimResults=false;

    document.getElementById('stat').innerText="🎧 Đang nghe...";

    recognition.onresult=(e)=>{
        let heard=e.results[0][0].transcript.toLowerCase().trim();
        let target=curWords[curIdx].en.toLowerCase().trim();

        if(heard.includes(target)){
            audioCorrect.currentTime=0;
            audioCorrect.play();   // ✅ TING

            totalPoints+=isWrongOnce?0.5:1;
            document.getElementById('stat').innerText="🌟 XUẤT SẮC!";
            setTimeout(()=>next(),1000);

        }else{
            audioWrong.currentTime=0;
            audioWrong.play();     // ❌ TÈ

            isWrongOnce=true;
            document.getElementById('stat').innerText="❌ Thử lại nhé!";
            document.getElementById('btnSkip').style.display='block';
        }
    };

    recognition.onerror=()=>{
        document.getElementById('stat').innerText="Không nghe rõ, thử lại!";
    };

    recognition.start();
}

function next(){
    if(curIdx<curWords.length-1){
        curIdx++;
        show();
    }else finish();
}

async function finish(){
    document.getElementById('studyPage').style.display='none';
    document.getElementById('resultPage').style.display='block';

    let finalScore=((totalPoints/curWords.length)*10).toFixed(1);
    document.getElementById('fScore').innerText=finalScore;

    document.getElementById('tutorDetails').innerText=
        finalScore>=8?
        "Tuyệt vời! Con phát âm rất chuẩn.":
        "Con cố gắng luyện tập thêm nhé!";

    try{
        const resp=await fetch(`${scriptURL}?name=${encodeURIComponent(sName)}&clss=${encodeURIComponent(cName)}&score=${finalScore}`);
        const data=await resp.json();

        if(!Array.isArray(data)) throw new Error();

        let classResults=data
            .filter(r=>Array.isArray(r)&&r.length>=3)
            .map((r,i)=>({
                name:(r[0]||"").trim(),
                clss:(r[1]||"").trim(),
                score:parseFloat(r[2])||0,
                timeOrder:i
            }))
            .filter(x=>x.clss===cName);

        classResults.sort((a,b)=>{
            if(b.score!==a.score) return b.score-a.score;
            return a.timeOrder-b.timeOrder;
        });

        document.getElementById('bContent').innerHTML=
            classResults.slice(0,20).map((r,i)=>{
                let isMe=r.name.toLowerCase()===
                    sName.toLowerCase().trim();
                return `
                <div class="rank-item ${isMe?'rank-me':''}">
                    <span>${i+1}. ${r.name}</span>
                    <strong>${r.score.toFixed(1)}đ</strong>
                </div>`;
            }).join('');

    }catch(e){
        document.getElementById('bContent').innerText=
            "Đã lưu điểm thành công!";
    }
}

window.onload=loadData;
</script>
